<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Проверка статуса обработки</title>
  <link rel="stylesheet" href="/audio-status/styles.css" />
</head>
<body>
  <main class="container">
    <h1>Проверка статуса по event_id</h1>
    <p class="subtitle">Введите event_id и secret, затем нажмите «Проверить».</p>

    <form id="status-form" novalidate>
      <label for="event-id">event_id</label>
      <input id="event-id" name="event_id" type="text" required placeholder="например, a1b2c3..." />

      <label for="secret">secret</label>
      <input id="secret" name="secret" type="text" required placeholder="секрет из ответа upload" />

      <button id="check-btn" type="submit">Проверить</button>
    </form>

    <section id="result" class="result hidden" aria-live="polite"></section>
    <section id="error" class="error hidden" aria-live="assertive"></section>

    <section class="smtp-panel" aria-live="polite">
      <div class="smtp-panel-header">
        <h2>Состояние SMTP-очереди</h2>
        <button id="smtp-refresh-btn" type="button">Обновить</button>
      </div>
      <p id="smtp-summary" class="smtp-summary">Нет данных.</p>
    </section>
  </main>

  <script src="/audio-status/app.js"></script>
</body>
</html>
