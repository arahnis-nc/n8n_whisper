services:
  parakeet:
    build:
      context: .
      dockerfile: Dockerfile.parakeet
    restart: unless-stopped
    environment:
      - PARAKEET_RECORDS_DIR=/data/records
      - PARAKEET_MODEL=${PARAKEET_MODEL}
      - PARAKEET_DEVICE=${PARAKEET_DEVICE}
    volumes:
      - ./runtime/records:/data/records
      - parakeet-cache:/root/.cache
    networks: [audionet]

  whisper:
    build:
      context: .
      dockerfile: Dockerfile.whisper
    restart: unless-stopped
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_WHISPER_MODEL=${OPENAI_WHISPER_MODEL}
    volumes:
      - ./runtime/records:/data/records
      - whisper-cache:/root/.cache/whisper
    networks: [audionet]

  audio-ingest:
    build:
      context: .
      dockerfile: Dockerfile.audio-ingest
    restart: unless-stopped
    environment:
      - AUDIO_RUNTIME_DIR=/data/audio
    volumes:
      - ./runtime/audio:/data/audio
    networks: [audionet]

  audio-ingest-worker:
    build:
      context: .
      dockerfile: Dockerfile.audio-ingest
    restart: unless-stopped
    environment:
      - AUDIO_RUNTIME_DIR=/data/audio
      - AUDIO_OUTBOX_POLL_SECONDS=${AUDIO_OUTBOX_POLL_SECONDS:-3}
      - AUDIO_OUTBOX_BATCH_SIZE=${AUDIO_OUTBOX_BATCH_SIZE:-10}
    volumes:
      - ./runtime/audio:/data/audio
    command: ["python", "-m", "audio_ingest_api.worker"]
    depends_on:
      - audio-ingest
    networks: [audionet]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - whisper
      - parakeet
      - audio-ingest
    ports:
      - "8080:80"
    volumes:
      - ./infrastructure/gateway/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infrastructure/gateway/nginx/static:/etc/nginx/static:ro
    networks: [audionet]

volumes:
  parakeet-cache:
  whisper-cache:

networks:
  audionet:
    driver: bridge

